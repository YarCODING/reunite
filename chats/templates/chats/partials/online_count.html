<span id="online-count" hx-swap-oob="outerHTML" class="fade-in-scale pr-1">
    {{ online_count }}
    <style>
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(4); }
            to { opacity: 1; transform: scale(1); }
        }
        .fade-in-scale {
            animation: fadeInScale 0.6s ease;
        }
    </style>
</span>

{% if online_count %}
    <div id="online-icon" hx-swap-oob="outerHTML" class="absolute bottom-0 right-0 w-3 h-3 rounded-full bg-emerald-500 border-2 border-white transition-colors duration-300"></div>
{% else %}
    <div id="online-icon" hx-swap-oob="outerHTML" class="absolute bottom-0 right-0 w-3 h-3 rounded-full bg-slate-300 border-2 border-white transition-colors duration-300"></div>
{% endif %}
