<messages>
    {% if messages %}
    <div x-data="{ showMessage: false }">
        {% for message in messages %}
        <div class="absolute left-0 right-0 max-w-xl mx-auto mt-4 px-4 z-60">
            <div x-cloak class="alert-{{ message.tags }} flex items-center py-3.5 pl-6 pr-4 text-white rounded-2xl shadow-xl backdrop-blur-md bg-opacity-95" role="alert"
                    x-show="showMessage" 
                    x-init="setTimeout(() => showMessage = true, 200), setTimeout(() => showMessage = false, 6000)"
                    x-transition:enter="duration-500 ease-out"
                    x-transition:enter-start="opacity-0 -translate-y-4 scale-95"
                    x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                    x-transition:leave="duration-200 ease-in"
                    x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                    x-transition:leave-end="opacity-0 -translate-y-4 scale-95">
                <div>
                    <div class="text-sm font-semibold tracking-wide">{{ message }}</div>
                </div>
                <div class="ml-auto cursor-pointer p-1 hover:bg-white/10 rounded-full transition" @click="showMessage = false">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </div>
            </div> 
        </div>
        {% endfor %}
    </div>
    {% endif %}
</messages>
