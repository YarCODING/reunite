{% extends 'layouts/blank.html' %}

{% block content %}
<div class="max-w-xl mx-auto py-12 px-4">
    <div class="bg-white dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-3xl p-8 shadow-sm text-left">
        <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-1">{% trans "Edit Listing" %}</h2>
        <p class="text-sm text-slate-400 dark:text-gray-500 mb-6">{% trans "Modify the details of your reported item." %}</p>
        
        <form method="POST" enctype="multipart/form-data" class="flex flex-col gap-4">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <div class="flex items-center gap-3 mt-4">
                <button type="submit" class="flex-1 h-11 bg-primary hover:bg-primary-dark text-white font-bold text-sm rounded-xl transition-all border-0 cursor-pointer">
                    {% trans "Save Changes" %}
                </button>
                <a href="{% url 'dashboard' %}" class="px-5 h-11 bg-slate-100 dark:bg-gray-700 hover:bg-slate-200 dark:hover:bg-gray-600 text-slate-500 dark:text-gray-300 rounded-xl font-medium text-sm flex items-center justify-center no-underline border-0">
                    {% trans "Cancel" %}
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    .dark input, 
    .dark select, 
    .dark textarea {
        background-color: #374151 !important;
        color: #f8fafc !important;
        border-color: #4b5563 !important;
    }
    .dark input::placeholder,
    .dark textarea::placeholder {
        color: #9ca3af !important;
    }
    
    .dark form p {
        color: #e2e8f0 !important;
    }
</style>
{% endblock %}
