<div class="flex flex-col gap-3.5 animate-fade-in w-full">
    {% for item in items %}
        
        {% include 'posts/item_line.html' %}
        
    {% empty %}
        <div class="w-full py-16 bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700 text-center shadow-sm">
            <div class="w-16 h-16 bg-gray-50 dark:bg-gray-300 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-folder-open text-gray-400 text-xl"></i>
            </div>
            <h3 class="font-bold text-gray-800 text-lg">{% trans "No listings found" %}</h3>
            <p class="text-sm text-gray-400 mt-1">{% trans "You haven't reported any items yet." %}</p>
        </div>
    {% endfor %}
</div>
